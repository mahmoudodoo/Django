<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="ticTac.css">
</head>
<body>
    <div class="container">
        <div class="jumbotron">
            <h1>Welcome To Tic Tac Game!</h1>
            <p>Get Ready To Play!</p>
            <button id="bRest" type="button" class="btn btn-primary btn-lg" name="button">Restart!</button>
            <button id="pA" type="button" class="btn btn-primary btn-lg" name="bA" onclick="printArray()">Print Array!</button>
        </div>
    </div>

    <table align="center">
        <tr>
            <td id="0"></td>
            <td id="1"></td>
            <td id="2"></td>
        </tr>

        <tr>
            <td id="3"></td>
            <td id="4"></td>
            <td id="5"></td>
        </tr>

        <tr>
            <td id="6"></td>
            <td id="7"></td>
            <td id="8"></td>
        </tr>
    </table>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha256-4+XzXVhsDmqanXGHaHvgh1gMQKX40OUvDEBTu8JcmNs=" crossorigin="anonymous"></script>

    <script src="ticTac.js"></script>
</body>
</html>

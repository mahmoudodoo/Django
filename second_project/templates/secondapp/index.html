<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Django Level 2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static "css/secondapp.css" %}">
</head>
<body>
    <div class="container" align="center">
        <h1>Hi, Bellow list of Access Records !!</h1>
    </div>
    <div class="djangotwo" align="center">
        {% if access_records %}
        <table>
            <thead>
                <th>Site Name</th>
                <th>Date Access</th>
            </thead>
        

        {% for acc in access_records %}
        <tr>
            <td>{{ acc.name }}</td>
            <td>{{ acc.date }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
        <p>NO ACCESS RECORDS FOUND !!!!</p>
    {% endif %}
    </div>
</body>
</html>
